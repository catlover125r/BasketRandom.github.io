<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Basket Random</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <meta name="generator" content="Construct 3">
  <link rel="manifest"   href="appmanifest.json">
  <link rel="icon"       href="favicon.ico">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="lobby.css">
</head>
<body>

<!-- ════════════════════════════════════════════════════════
     GAME — loads immediately so it's running behind the overlay
════════════════════════════════════════════════════════ -->
<script src="box2d.wasm.js"></script>
<script src="scripts/supportcheck.js"></script>
<script src="scripts/offlineclient.js"></script>
<script src="scripts/main.f.js"></script>
<script src="scripts/register-sw.js"></script>

<!-- ════════════════════════════════════════════════════════
     LOBBY OVERLAY
     Shows on top of the game's own menu.
     Handles 2-player selection only — 1-player just closes this.
════════════════════════════════════════════════════════ -->
<div id="lobby-overlay">

  <div class="lobby-logo">
    <h1>BASKET RANDOM</h1>
  </div>

  <!-- ── Screen: 2-player choice (the main/only screen) ── -->
  <div id="ls-main" class="lscreen active">
    <h2>2 PLAYERS</h2>
    <button class="lbtn blue" onclick="Lobby.showOnlineOptions()">ONLINE</button>
    <button class="lbtn"      onclick="Lobby.startLocal()">ONE COMPUTER</button>
    <button class="lbtn ghost" onclick="Lobby.closeLobby()">✕ 1 Player / Close</button>
  </div>

  <!-- ── Screen: Online options ────────────────────────── -->
  <div id="ls-online" class="lscreen">
    <h2>ONLINE</h2>
    <button class="lbtn"      onclick="Lobby.createRoom()">CREATE ROOM</button>
    <button class="lbtn blue" onclick="Lobby.showRoomList()">JOIN ROOM</button>
    <button class="lbtn ghost" onclick="Lobby.showScreen('main')">← Back</button>
  </div>

  <!-- ── Screen: Create Room ───────────────────────────── -->
  <div id="ls-create-room" class="lscreen">
    <h2>Waiting for Player 2</h2>
    <div class="room-info-box">
      <div class="room-label">Your Room</div>
      <div class="room-code" id="lobby-room-code">······</div>
      <div class="room-hint" id="create-status-text">Creating room…</div>
    </div>
    <div class="dots"><span></span><span></span><span></span></div>
    <button class="lbtn ghost" onclick="Lobby.cancelRoom()">Cancel</button>
  </div>

  <!-- ── Screen: Room List ─────────────────────────────── -->
  <div id="ls-room-list" class="lscreen">
    <h2>Join a Room</h2>
    <div class="room-list-header">
      <div></div>
      <button class="refresh-btn" onclick="Lobby.loadRoomList()">↺ Refresh</button>
    </div>
    <div id="rooms-list">
      <div class="rooms-empty">Loading rooms…</div>
    </div>
    <button class="lbtn ghost" onclick="Lobby.showScreen('online')">← Back</button>
  </div>

  <!-- ── Screen: Connecting ────────────────────────────── -->
  <div id="ls-connecting" class="lscreen">
    <h2>Connecting</h2>
    <div class="dots"><span></span><span></span><span></span></div>
    <div id="connect-status-text">Connecting to host…</div>
    <button class="lbtn ghost" onclick="Lobby.showScreen('room-list')">Cancel</button>
  </div>

</div><!-- /#lobby-overlay -->


<!-- ════════════════════════════════════════════════════════
     HOST BANNER  (tiny non-blocking — host can play normally)
════════════════════════════════════════════════════════ -->
<div id="host-overlay">
  <span class="hw-title">Waiting for Player 2…</span>
  <div class="dots sm"><span></span><span></span><span></span></div>
</div>


<!-- ════════════════════════════════════════════════════════
     JOINER UI  (fullscreen video of host's game)
════════════════════════════════════════════════════════ -->
<div id="joiner-ui">
  <div id="joiner-waiting">
    <div style="color:#667;font-family:Arial,sans-serif;font-size:15px;letter-spacing:1px;">
      Receiving game stream…
    </div>
    <div class="dots"><span></span><span></span><span></span></div>
  </div>
  <video id="joiner-video" autoplay playsinline muted></video>
  <div class="controls-hint">↑ Arrow = Jump &nbsp;|&nbsp; Tap screen = Jump</div>
</div>


<!-- ════════════════════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════════════════════ -->
<script>
window.addEventListener('keydown', function(e) {
  if ([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) e.preventDefault();
}, false);
</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="firebase-config.js"></script>
<script src="lobby.js"></script>

</body>
</html>
